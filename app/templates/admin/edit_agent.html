{% extends "admin/base.html" %}

{% block title %}Edit Agent: {{ agent.name }}{% endblock %}

{% block header_title %}Edit Virtual Agent{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8">
    <a href="{{ url_for('admin_agents') }}" class="text-indigo-400 hover:underline text-sm">← Back to Agents</a>
    
    <div class="card-style">
        <h2 class="card-header text-xl font-bold mb-6 pb-2">Modify Agent: <span class="text-indigo-400">{{ agent.name }}</span></h2>
        
        <form action="{{ url_for('admin_edit_agent_post', agent_id=agent.id) }}" method="post" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs text-gray-400 uppercase font-bold mb-1">Agent Name (Unique ID)</label>
                    <input type="text" name="name" value="{{ agent.name }}" required class="w-full p-2 rounded bg-black/20 border border-white/10 focus:border-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase font-bold mb-1">Base Model</label>
                    <select name="base_model" class="w-full p-2 rounded bg-black/20 border border-white/10 focus:border-indigo-500 outline-none">
                        {% for m in available_models %}
                        <option value="{{ m }}" {% if m == agent.base_model %}selected{% endif %}>{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs text-gray-400 uppercase font-bold mb-1">System Prompt (The Agent's Soul)</label>
                <textarea name="system_prompt" rows="10" required class="w-full p-3 rounded bg-black/20 border border-white/10 focus:border-indigo-500 outline-none font-sans">{{ agent.system_prompt }}</textarea>
            </div>

            <div class="flex justify-end pt-4">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 px-10 py-2 rounded font-bold text-sm transition-colors shadow-lg">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
