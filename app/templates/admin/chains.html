{% extends "admin/base.html" %}
{% block title %}Chains (Swarms){% endblock %}
{% block header_title %}Model Chains (Swarm){% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="card-style">
        <h2 class="card-header text-xl font-bold mb-4">Create New Chain</h2>
        <form action="{{ url_for('admin_add_chain') }}" method="post" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 uppercase font-bold">Chain Name</label>
                    <input type="text" name="name" placeholder="e.g. vision-to-text-chain" required class="w-full p-2 rounded bg-black/20 border border-white/10">
                </div>
                <div id="chain-steps" class="space-y-2">
                    <label class="block text-xs text-gray-400 uppercase font-bold">Steps (Order of execution)</label>
                    <select name="steps" class="w-full p-2 rounded bg-black/20 border border-white/10">
                        {% for m in raw_models %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <button type="button" onclick="addStep()" class="text-xs text-indigo-400 hover:underline">+ Add Step</button>
            <div class="flex justify-end">
                <button type="submit" class="bg-indigo-600 px-6 py-2 rounded font-bold text-sm">Deploy Chain</button>
            </div>
        </form>
    </div>

    <div class="card-style">
        <h2 class="card-header text-xl font-bold mb-4">Active Chains</h2>
        <table class="w-full text-left">
            <tbody class="divide-y divide-white/5">
                {% for c in chains %}
                <tr>
                    <td class="p-3 font-bold text-indigo-400">{{ c.name }}</td>
                    <td class="p-3 text-xs font-mono text-gray-400">{{ ' → '.join(c.steps) }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    function addStep() {
        const container = document.getElementById('chain-steps');
        const select = container.children[1].cloneNode(true);
        container.appendChild(select);
    }
</script>
{% endblock %}
