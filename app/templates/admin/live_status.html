{% extends "admin/base.html" %}

{% block title %}Live System Flow{% endblock %}

{% block header_title %}System Architecture Flow{% endblock %}

{% block content %}
<style>
    #status-tooltip {
        pointer-events: none;
        position: fixed;
        z-index: 100;
        background: rgba(10, 10, 15, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        display: none;
        font-family: ui-monospace, monospace;
        backdrop-filter: blur(10px);
    }
</style>

<div class="card-style h-[80vh] flex flex-col p-0 overflow-hidden relative border-2 border-white/5 bg-[#030305]">
    <!-- Tooltip Element -->
    <div id="status-tooltip"></div>

    <!-- Header -->
    <div class="p-4 border-b border-white/10 flex flex-col md:flex-row justify-between items-center bg-black/40 backdrop-blur-md z-20 gap-4">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 rounded-full bg-[var(--color-primary-600)] flex items-center justify-center shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div>
                <h2 class="text-xl font-bold text-white tracking-tight">Live Request Pipeline</h2>
                <div class="flex items-center gap-3 mt-0.5">
                    <span id="connection-status" class="text-[9px] font-black px-2 py-0.5 rounded border border-white/10">OFFLINE</span>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Session Telemetry Active</p>
                </div>
            </div>
            <button onclick="window.location.reload()" class="p-2 hover:bg-white/10 rounded-lg text-gray-500 hover:text-white transition-colors" title="Reset View">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>

        <!-- Session Stats Bar -->
        <div class="flex gap-6 items-center px-6 py-2 bg-white/5 rounded-2xl border border-white/5">
            <div class="text-center">
                <div class="text-[10px] text-gray-500 font-bold uppercase">Active Load</div>
                <div id="stat-load" class="text-lg font-black text-indigo-400">0</div>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="text-center">
                <div class="text-[10px] text-gray-500 font-bold uppercase">Session Tokens</div>
                <div id="stat-tokens" class="text-lg font-black text-emerald-400">0</div>
            </div>
            <div class="w-px h-8 bg-white/10"></div>
            <div class="text-center">
                <div class="text-[10px] text-gray-500 font-bold uppercase">Avg. TTFT</div>
                <div id="stat-avg-ttft" class="text-lg font-black text-amber-400">0<span class="text-[10px] ml-0.5 text-gray-500">ms</span></div>
            </div>
        </div>
    </div>
    
    <div class="flex-grow relative cursor-crosshair" id="canvas-container">
        <canvas id="flowCanvas" class="w-full h-full"></canvas>
        
        <!-- Trash Bin -->
        <div id="trash-bin" class="absolute bottom-6 right-6 p-4 rounded-xl bg-white/5 border border-white/10 flex flex-col items-center opacity-40">
            <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('flowCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const statusEl = document.getElementById('connection-status');
    const tooltip = document.getElementById('status-tooltip');
    const trashBin = document.getElementById('trash-bin');
    
    let width, height;
    let mouse = { x: 0, y: 0 };
    const particles = new Map();
    const historyQueue = []; // Array of completed particles
    const MAX_HISTORY = 10;
    const serverNodes = new Map(); 
    
    // Global session stats
    let sessionStats = {
        totalTokens: 0,
        ttftSum: 0,
        ttftCount: 0
    };

    const THEME = {
        bg: '#030305',
        lineBase: 'rgba(255, 255, 255, 0.05)',
        received: '#6366f1',
        assigned: '#f59e0b',
        active: '#10b981',
        success: '#10b981',
        error: '#ef4444'
    };

    function resize() {
        width = container.clientWidth;
        height = container.clientHeight;
        canvas.width = width * window.devicePixelRatio;
        canvas.height = height * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resize);
    resize();

    container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });

    async function syncServers() {
        try {
            const resp = await fetch("{{ url_for('admin_get_server_nodes') }}");
            const data = await resp.json();
            data.forEach(s => updateServerLayout(s.name));
        } catch(e) { console.error(e); }
    }
    syncServers();

    const evtSource = new EventSource("{{ url_for('sse_events') }}");
    evtSource.onopen = () => {
        statusEl.innerHTML = '● LIVE PIPELINE';
        statusEl.className = "text-[10px] font-black px-3 py-1 rounded-md border border-green-500/30 text-green-500 bg-green-500/10";
    };
    evtSource.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); } catch(err) {}
    };

    function handleEvent(data) {
        const { type, id, server, model, sender, ttft, tps, tokens } = data;
        
        // Always update lastSeen for existing particles to prevent GC during long streams
        if (particles.has(id)) {
            particles.get(id).lastSeen = Date.now();
        }

        if (!particles.has(id) && type !== 'completed' && type !== 'error') {
            particles.set(id, {
                id, state: 'queued', progress: 0,
                sender: sender || 'anon', model: model || 'unknown',
                color: THEME.received, size: 5, alpha: 1,
                yOffset: (Math.random() - 0.5) * 15,
                startTime: Date.now(),
                lastSeen: Date.now(),
                ttft: 0, tps: 0
            });
        } else if (type === 'assigned') {
            const p = particles.get(id);
            if (p) { 
                if (p.state === 'queued') { p.state = 'traveling'; p.progress = 0; }
                p.targetServer = server;
                if (!serverNodes.has(server)) updateServerLayout(server);
            }
        } else if (type === 'active') {
            const p = particles.get(id);
            if (p) { 
                p.state = 'active'; 
                p.color = THEME.active; 
                p.ttft = ttft;
                // Update Session Avg TTFT
                sessionStats.ttftSum += ttft;
                sessionStats.ttftCount++;
                document.getElementById('stat-avg-ttft').innerHTML = `${Math.round(sessionStats.ttftSum / sessionStats.ttftCount)}<span class="text-[10px] ml-0.5 text-gray-500">ms</span>`;
            }
        } else if (type === 'completed') {
            const p = particles.get(id);
            if (p) { 
                p.state = 'completed'; 
                p.color = THEME.success;
                p.tps = tps;
                p.finalTokens = tokens;
                p.finishTime = Date.now();
                
                // Add to history queue
                historyQueue.unshift(p);
                if (historyQueue.length > MAX_HISTORY) {
                    const removed = historyQueue.pop();
                    particles.delete(removed.id);
                }

                // Update Session Tokens
                sessionStats.totalTokens += tokens;
                document.getElementById('stat-tokens').innerText = sessionStats.totalTokens.toLocaleString();
            }
        } else if (type === 'error') {
            const p = particles.get(id);
            if (p) { 
                p.state = 'completed'; // Send to cemetery
                p.color = THEME.error; 
                p.finishTime = Date.now();
                
                historyQueue.unshift(p);
                if (historyQueue.length > MAX_HISTORY) {
                    const removed = historyQueue.pop();
                    particles.delete(removed.id);
                }
            }
        }
    }

    function updateServerLayout(name) {
        serverNodes.set(name, { name });
        const names = Array.from(serverNodes.keys()).sort();
        const padding = 100;
        const availableHeight = height - (padding * 2);
        const step = names.length > 1 ? availableHeight / (names.length - 1) : 0;
        
        names.forEach((n, i) => {
            serverNodes.set(n, {
                name: n,
                x: width - 220, // Move server slightly left to leave room for the line
                y: names.length > 1 ? padding + (i * step) : height / 2
            });
        });
    }

    // Helper to get exact coordinates along the multi-segment path
    function getPathPos(t, s) {
        const startX = 60;
        const centerY = height / 2;
        const splitX = width * 0.4;
        const endX = s.x;
        const endY = s.y;

        // segment lengths (approx proportions)
        // 1: x-line, 2: curve, 3: y-line, 4: curve, 5: x-line
        if (t <= 0.3) { // Segment 1: Horizontal
            const st = t / 0.3;
            return { x: startX + (splitX - 30 - startX) * st, y: centerY };
        } else if (t <= 0.4) { // Segment 2: First Curve
            const st = (t - 0.3) / 0.1;
            const inv = 1 - st;
            const p0 = { x: splitX - 30, y: centerY };
            const p1 = { x: splitX, y: centerY };
            const p2 = { x: splitX, y: centerY + (endY > centerY ? 30 : -30) };
            return {
                x: inv * inv * p0.x + 2 * inv * st * p1.x + st * st * p2.x,
                y: inv * inv * p0.y + 2 * inv * st * p1.y + st * st * p2.y
            };
        } else if (t <= 0.6) { // Segment 3: Vertical
            const st = (t - 0.4) / 0.2;
            const yStart = centerY + (endY > centerY ? 30 : -30);
            const yEnd = endY - (endY > centerY ? 30 : -30);
            return { x: splitX, y: yStart + (yEnd - yStart) * st };
        } else if (t <= 0.7) { // Segment 4: Second Curve
            const st = (t - 0.6) / 0.1;
            const inv = 1 - st;
            const p0 = { x: splitX, y: endY - (endY > centerY ? 30 : -30) };
            const p1 = { x: splitX, y: endY };
            const p2 = { x: splitX + 30, y: endY };
            return {
                x: inv * inv * p0.x + 2 * inv * st * p1.x + st * st * p2.x,
                y: inv * inv * p0.y + 2 * inv * st * p1.y + st * st * p2.y
            };
        } else { // Segment 5: Final Horizontal
            const st = (t - 0.7) / 0.3;
            return { x: (splitX + 30) + (endX - (splitX + 30)) * st, y: endY };
        }
    }

    function draw() {
        ctx.fillStyle = THEME.bg;
        ctx.fillRect(0, 0, width, height);

        const startX = 60;
        const splitX = width * 0.4;
        const centerY = height / 2;
        const historyX = 80;
        const historyTopY = height - 60;
        let activeHover = null;

        // 0. Pre-pass for hover detection to toggle labels
        particles.forEach((p) => {
            const dist = Math.hypot(mouse.x - p.x, mouse.y - p.y);
            if (dist < 15) activeHover = { type: 'request', data: p };
        });

        // 1. Draw Paths
        ctx.lineWidth = 2;
        serverNodes.forEach(s => {
            ctx.beginPath();
            ctx.strokeStyle = THEME.lineBase;
            ctx.moveTo(startX, centerY);
            ctx.lineTo(splitX - 30, centerY);
            ctx.quadraticCurveTo(splitX, centerY, splitX, centerY + (s.y > centerY ? 30 : -30));
            ctx.lineTo(splitX, s.y + (s.y > centerY ? -30 : 30));
            ctx.quadraticCurveTo(splitX, s.y, splitX + 30, s.y);
            ctx.lineTo(s.x, s.y);
            ctx.stroke();

            // Server Box
            const isHover = mouse.x > s.x && mouse.x < s.x + 180 && Math.abs(mouse.y - s.y) < 20;
            ctx.fillStyle = isHover ? 'rgba(255,255,255,0.05)' : '#0a0a0f';
            ctx.strokeStyle = isHover ? THEME.active : 'rgba(255,255,255,0.1)';
            ctx.beginPath();
            ctx.roundRect(s.x, s.y - 15, 180, 30, 6);
            ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px ui-monospace';
            ctx.textAlign = 'left';
            ctx.fillText(s.name, s.x + 10, s.y + 3);

            if (isHover) activeHover = { type: 'server', data: s };
        });

        // 2. Gateway
        ctx.fillStyle = '#0a0a0f';
        ctx.strokeStyle = THEME.received;
        ctx.beginPath();
        ctx.arc(startX, centerY, 22, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();

        // 2.5 Draw History Header (Cemetery)
        if (historyQueue.length > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = 'bold 9px ui-monospace';
            ctx.textAlign = 'left';
            ctx.fillText('⚰️ CEMETERY (LAST FINISHED)', historyX - 10, historyTopY - 15);
        }

        // 3. Prepare Server Slots (to prevent overlapping)
        const serverSlots = new Map(); // serverName -> count of active particles
        // 4. Garbage Collection (Clear artifacts from disconnected clients)
        const now = Date.now();
        particles.forEach((p, id) => {
            const age = now - p.lastSeen;
            
            // Aggressive cleanup: 
            // - Queued requests that never assigned within 30s
            // - Active requests with no updates for 60s (likely lost SSE connection)
            if ((p.state === 'active' && age > 60000) || (p.state === 'queued' && age > 30000)) {
                // If it was active but "died", move it to history as an error before deleting
                if (p.state === 'active' && !historyQueue.includes(p)) {
                    p.state = 'completed';
                    p.color = THEME.error;
                    historyQueue.unshift(p);
                } else {
                    particles.delete(id);
                }
                return;
            }
        });


        // 5. Particles
        particles.forEach((p, id) => {
            let x, y;
            const speed = 0.008;

            if (p.state === 'queued') {
                x = startX; y = centerY + p.yOffset;
                p.progress += 0.05;
                p.size = 5 + Math.sin(p.progress) * 2;
            } else if (p.state === 'completed') {
                // Determine target position in the history list (Cemetery - Horizontal)
                const historyIndex = historyQueue.indexOf(p);
                if (historyIndex === -1) return;

                const targetX = historyX + (historyIndex * 30);
                const targetY = historyTopY;
                
                // Smoothly glide to history slot at the bottom
                p.x += (targetX - p.x) * 0.05;
                p.y += (targetY - p.y) * 0.05;
                x = p.x; y = p.y;
                
                // Fade out as they get pushed to the bottom edge
                const fadeThreshold = MAX_HISTORY * 0.6;
                if (historyIndex > fadeThreshold) {
                    p.alpha = Math.max(0, 0.6 * (1 - (historyIndex - fadeThreshold) / (MAX_HISTORY - fadeThreshold)));
                } else {
                    p.alpha = 0.6;
                }
                p.size = 3;
            } else if (p.state === 'traveling') {
                p.progress += speed * 1.5;
                const s = serverNodes.get(p.targetServer);
                const pos = getPathPos(p.progress, s);
                x = pos.x; y = pos.y;
                if (p.progress >= 1) p.state = 'active';
            } else if (p.state === 'active') {
                const s = serverNodes.get(p.targetServer);
                const slot = serverSlots.get(p.targetServer) || 0;
                serverSlots.set(p.targetServer, slot + 1);
                
                // Stay on the line (Segment 5) by mapping slot to a slightly-less-than-1 progress
                // Each particle sits ~20 pixels apart on the horizontal line segment
                const pos = getPathPos(0.98 - (slot * 0.025), s);
                x = pos.x; y = pos.y;
                
                p.size = 6 + Math.sin(Date.now()/100) * 2;
            } else if (p.state === 'exiting') {
                p.exitProgress += 0.02;
                const s = serverNodes.get(p.targetServer) || {x: width/2, y: height/2};
                x = s.x + ( (width - 40) - s.x ) * p.exitProgress;
                y = s.y + ( (height - 40) - s.y ) * p.exitProgress;
                p.alpha = 1 - p.exitProgress;
                if (p.exitProgress >= 1) particles.delete(id);
            }

            p.x = x; p.y = y;

            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(x, y, p.size, 0, Math.PI*2);
            ctx.fill();

            // REFINED LABELS: Only show when hovered
            if (p.state !== 'failed' && activeHover && activeHover.data.id === id) {
                ctx.font = 'bold 10px ui-monospace';
                let labelText = `[${p.sender}] ${p.model}`;
                if (p.state === 'completed' || p.state === 'active') {
                    labelText += ` | ${p.ttft}ms | ${p.tps}t/s`;
                }
                const m = ctx.measureText(labelText);
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.beginPath();
                
                const labelY = y - 13;
                const pillY = y - 25;
                const labelX = x;

                ctx.roundRect(x - m.width/2 - 8, pillY, m.width + 16, 16, 4);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText(labelText, labelX, labelY);
            }
            ctx.restore();
        });

        // 4. Tooltip Logic
        // Update Load Stat
        document.getElementById('stat-load').innerText = Array.from(particles.values()).filter(p => p.state === 'active').length;

        if (activeHover) {
            tooltip.style.display = 'block';
            
            // Boundary-aware positioning
            let tx = mouse.x + 20;
            let ty = mouse.y + 20;
            
            // Temporarily set content to measure
            if (activeHover.type === 'request') {
                const p = activeHover.data;
                const elapsed = ((Date.now() - p.startTime) / 1000).toFixed(1);
                tooltip.innerHTML = `
                    <div class="text-[var(--color-primary-400)] font-bold mb-1">REQUEST INFO</div>
                    <div class="text-white text-xs border-b border-white/5 pb-2 mb-2">
                        ID: <span class="text-gray-400">${p.id}</span><br>
                        USER: <span class="text-gray-400">${p.sender}</span><br>
                        MODEL: <span class="text-gray-400">${p.model}</span><br>
                        STATE: <span style="color:${p.color}">${p.state.toUpperCase()}</span>
                    </div>
                    <div class="text-[var(--color-primary-400)] font-bold mb-1">METRICS</div>
                    <div class="text-white text-xs">
                        TTFT: <span class="text-amber-400">${(p.ttft !== undefined && p.ttft !== null) ? p.ttft : '--'} ms</span><br>
                        SPEED: <span class="text-emerald-400">${(p.tps !== undefined && p.tps !== null) ? p.tps : '--'} t/s</span><br>
                        TOKENS: <span class="text-emerald-400">${p.finalTokens || '--'}</span><br>
                        TOTAL TIME: <span class="text-gray-400">${elapsed}s</span>
                    </div>
                `;
            } else {
                const s = activeHover.data;
                tooltip.innerHTML = `
                    <div class="text-green-400 font-bold mb-1">SERVER NODE</div>
                    <div class="text-white text-xs">NAME: ${s.name}</div>
                `;
            }

            // Flip tooltip if near edges
            const bounds = container.getBoundingClientRect();
            if (tx + 220 > bounds.width) tx = mouse.x - 240;
            if (ty + 180 > bounds.height) ty = mouse.y - 200;

            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
        } else {
            tooltip.style.display = 'none';
        }

        requestAnimationFrame(draw);
    }
    
    draw();
});
</script>
{% endblock %}
